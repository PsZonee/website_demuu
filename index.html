<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sorry in Every Language</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      overflow: hidden;
    }

    #canvas {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      pointer-events: none;
      font-weight: 500;
      white-space: nowrap;
      animation: floatUp linear forwards;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(0.7); }
      15%  { opacity: 1; transform: translateY(-30px) scale(1); }
      75%  { opacity: 0.9; }
      100% { opacity: 0; transform: translateY(-300px) scale(0.85); }
    }

    #center-sorry {
      font-size: 72px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 4px;
      text-align: center;
      z-index: 10;
      position: relative;
      animation: pulse 2s ease-in-out infinite;
      text-shadow: 0 0 60px rgba(180,120,255,0.6), 0 0 20px rgba(180,120,255,0.4);
      transition: opacity 0.4s;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); text-shadow: 0 0 60px rgba(180,120,255,0.6); }
      50%       { transform: scale(1.06); text-shadow: 0 0 90px rgba(180,120,255,0.9), 0 0 30px rgba(120,200,255,0.5); }
    }

    #sub {
      font-size: 15px;
      color: rgba(255,255,255,0.35);
      text-align: center;
      z-index: 10;
      position: relative;
      margin-top: 12px;
      letter-spacing: 3px;
    }

    #lang-ticker {
      font-size: 18px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      text-align: center;
      z-index: 10;
      position: relative;
      margin-top: 20px;
      min-height: 28px;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <div id="canvas">
    <div id="center-sorry">SORRY</div>
    <div id="sub">sorry &middot; sorry &middot; sorry &middot; sorry &middot; sorry</div>
    <div id="lang-ticker"></div>
  </div>

  <script>
    const sorries = [
      { word: "Sorry",           lang: "English" },
      { word: "Lo siento",       lang: "Spanish" },
      { word: "Désolé",          lang: "French" },
      { word: "Es tut mir leid", lang: "German" },
      { word: "Mi dispiace",     lang: "Italian" },
      { word: "Desculpe",        lang: "Portuguese" },
      { word: "Извините",        lang: "Russian" },
      { word: "对不起",            lang: "Chinese" },
      { word: "ごめんなさい",       lang: "Japanese" },
      { word: "미안합니다",         lang: "Korean" },
      { word: "مَعْذِرَة",         lang: "Arabic" },
      { word: "क्षमा करें",        lang: "Hindi" },
      { word: "Przepraszam",     lang: "Polish" },
      { word: "Özür dilerim",    lang: "Turkish" },
      { word: "متأسفم",           lang: "Persian" },
      { word: "Maaf",            lang: "Indonesian" },
      { word: "Xin lỗi",         lang: "Vietnamese" },
      { word: "Beklager",        lang: "Norwegian" },
      { word: "Förlåt",          lang: "Swedish" },
      { word: "Anteeksi",        lang: "Finnish" },
      { word: "Συγγνώμη",        lang: "Greek" },
      { word: "Omlouvám se",     lang: "Czech" },
      { word: "Sajnálom",        lang: "Hungarian" },
      { word: "Iertați-mă",      lang: "Romanian" },
      { word: "Pardon",          lang: "Dutch" },
      { word: "Samahani",        lang: "Swahili" },
      { word: "Mea culpa",       lang: "Latin" },
      { word: "কষমা করবেন",       lang: "Bengali" },
      { word: "ਮੁਆਫ਼ ਕਰੋ",         lang: "Punjabi" },
      { word: "மன்னிக்கவும்",     lang: "Tamil" },
      { word: "క్షమించండి",       lang: "Telugu" },
      { word: "ക്ഷമിക്കണം",       lang: "Malayalam" },
      { word: "ขอโทษ",            lang: "Thai" },
      { word: "ຂໍໂທດ",             lang: "Lao" },
      { word: "Ngiyaxolisa",     lang: "Zulu" },
      { word: "Kafara",          lang: "Somali" },
      { word: "Perdón",          lang: "Spanish (alt)" },
      { word: "Scusa",           lang: "Italian (alt)" },
      { word: "Atvainojiet",     lang: "Latvian" },
      { word: "Atsiprašau",      lang: "Lithuanian" },
    ];

    const colors = [
      "#b47fff","#7fd4ff","#ff7faa","#7fffb4","#ffd47f",
      "#ff9f7f","#7fbfff","#c9ff7f","#ff7fd4","#7fffff",
      "#ffb347","#47ffb3","#ff6699","#99ff66","#6699ff",
    ];

    const canvas = document.getElementById('canvas');
    const ticker = document.getElementById('lang-ticker');
    let tickerIdx = 0;

    function spawnParticle() {
      const s = sorries[Math.floor(Math.random() * sorries.length)];
      const el = document.createElement('div');
      el.className = 'particle';
      el.textContent = s.word;
      const size = 13 + Math.random() * 24;
      el.style.fontSize = size + 'px';
      el.style.color = colors[Math.floor(Math.random() * colors.length)];
      el.style.left = (Math.random() * 90 + 2) + '%';
      el.style.bottom = (Math.random() * 35 + 5) + '%';
      const dur = 2.5 + Math.random() * 3;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = (Math.random() * 0.4) + 's';
      canvas.appendChild(el);
      setTimeout(() => el.remove(), (dur + 0.8) * 1000);
    }

    function rotateTicker() {
      ticker.style.opacity = '0';
      setTimeout(() => {
        const s = sorries[tickerIdx % sorries.length];
        ticker.textContent = s.word + ' — ' + s.lang;
        ticker.style.opacity = '1';
        tickerIdx++;
      }, 300);
    }

    setInterval(spawnParticle, 220);
    rotateTicker();
    setInterval(rotateTicker, 1500);

    const mainWords = [
      "SORRY", "对不起", "ごめんなさい", "DÉSOLÉ",
      "LO SIENTO", "SCUSA", "PARDON", "ИЗВИНИТЕ",
      "क्षमा", "미안해요", "SORRY"
    ];
    let mIdx = 0;
    const centerEl = document.getElementById('center-sorry');

    setInterval(() => {
      centerEl.style.opacity = '0';
      setTimeout(() => {
        mIdx = (mIdx + 1) % mainWords.length;
        centerEl.textContent = mainWords[mIdx];
        centerEl.style.opacity = '1';
      }, 400);
    }, 2200);
  </script>
</body>
</html>
